apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: movie-db
  template:
    metadata:
      labels:
        app: movie-db
    spec:
      containers:
        - name: movie-db
          image: postgres:12.1-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: movie_db_username
            - name: POSTGRES_PASSWORD
              value: movie_db_password
            - name: POSTGRES_DB
              value: movie_db
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U movie_db_username -d movie_db
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: movie-db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: movie-db-data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: movie-db
spec:
  selector:
    app: movie-db
  ports:
    - port: 5432
      targetPort: 5432

